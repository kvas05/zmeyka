<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Змейка</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        h1 {
            margin: 0 0 10px;
        }
        #score {
            margin-bottom: 10px;
            font-size: 18px;
        }
        canvas {
            background: #7ec850;
            border: 2px solid #555;
        }
        #gameOver {
            display: none;
            margin-top: 10px;
            font-size: 18px;
            color: #ff5555;
        }
        button {
            margin-top: 10px;
            padding: 8px 16px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Змейка</h1>
    <div id="score">Счёт: 0</div>
    <canvas id="game" width="400" height="400"></canvas>
    <div id="gameOver">Игра окончена! Нажмите "Заново"</div>
    <button onclick="resetGame()">Заново</button>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const gameOverEl = document.getElementById('gameOver');

        const foodImg = new Image();
        foodImg.src = './food.png';

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [
            { x: 10, y: 10 },
            { x: 9, y: 10 },
            { x: 8, y: 10 }
        ];
        let food = { x: 15, y: 15 };
        let dx = 1;
        let dy = 0;
        let score = 0;
        let gameRunning = true;

        function drawGame() {
            if (!gameRunning) return;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Проверка столкновений со стенами
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // Проверка столкновений с собой
            for (let part of snake) {
                if (head.x === part.x && head.y === part.y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            // Проверка поедания еды
            if (head.x === food.x && head.y === food.y) {
                score++;
                scoreEl.textContent = 'Счёт: ' + score;
                placeFood();
            } else {
                snake.pop();
            }

            // Отрисовка
            ctx.fillStyle = '#222';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Фон клетками
            for (let i = 0; i < tileCount; i++) {
                for (let j = 0; j < tileCount; j++) {
                    ctx.fillStyle = (i + j) % 2 === 0 ? '#7ec850' : '#72b248';
                    ctx.fillRect(i * gridSize, j * gridSize, gridSize, gridSize);
                }
            }

            // Еда (изображение удочки, обрезанное по кругу)
            const fx = food.x * gridSize;
            const fy = food.y * gridSize;
            const size = gridSize;
            const cx = fx + size / 2;
            const cy = fy + size / 2;
            const r = size / 2 - 1;

            ctx.save();
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.closePath();
            ctx.clip();

            if (foodImg.complete && foodImg.naturalWidth > 0) {
                const imgSize = size * 1.5;
                ctx.drawImage(foodImg, cx - imgSize / 2, cy - imgSize / 2, imgSize, imgSize);
            } else {
                ctx.fillStyle = '#ff5555';
                ctx.fill();
            }

            ctx.restore();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.stroke();

            // Тело змейки — плавная синяя линия
            ctx.strokeStyle = '#2d6cdf';
            ctx.lineWidth = gridSize - 2;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            for (let i = 0; i < snake.length; i++) {
                const part = snake[i];
                const px = part.x * gridSize + gridSize / 2;
                const py = part.y * gridSize + gridSize / 2;
                if (i === 0) {
                    ctx.moveTo(px, py);
                } else {
                    ctx.lineTo(px, py);
                }
            }
            ctx.stroke();

            // Голова змейки с глазами и ртом
            const headPart = snake[0];
            const hx = headPart.x * gridSize;
            const hy = headPart.y * gridSize;
            const hr = gridSize / 2;

            ctx.fillStyle = '#2d6cdf';
            ctx.beginPath();
            ctx.arc(hx + gridSize / 2, hy + gridSize / 2, hr, 0, Math.PI * 2);
            ctx.fill();

            // Глаза
            ctx.fillStyle = '#fff';
            let eyeOffsetX = 0, eyeOffsetY = 0;
            if (dx === 1) eyeOffsetX = 4;
            else if (dx === -1) eyeOffsetX = -4;
            else if (dy === -1) eyeOffsetY = -4;
            else if (dy === 1) eyeOffsetY = 4;

            ctx.beginPath();
            ctx.arc(hx + gridSize / 2 - 3 + eyeOffsetX, hy + gridSize / 2 - 3 + eyeOffsetY, 3, 0, Math.PI * 2);
            ctx.arc(hx + gridSize / 2 + 3 + eyeOffsetX, hy + gridSize / 2 - 3 + eyeOffsetY, 3, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(hx + gridSize / 2 - 3 + eyeOffsetX, hy + gridSize / 2 - 3 + eyeOffsetY, 1.5, 0, Math.PI * 2);
            ctx.arc(hx + gridSize / 2 + 3 + eyeOffsetX, hy + gridSize / 2 - 3 + eyeOffsetY, 1.5, 0, Math.PI * 2);
            ctx.fill();

            // Рот
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            if (dx === 1) {
                ctx.arc(hx + gridSize / 2 + 2, hy + gridSize / 2 + 4, 4, 0, Math.PI, false);
            } else if (dx === -1) {
                ctx.arc(hx + gridSize / 2 - 2, hy + gridSize / 2 + 4, 4, 0, Math.PI, false);
            } else if (dy === -1) {
                ctx.arc(hx + gridSize / 2, hy + gridSize / 2 - 2, 4, 0, Math.PI, true);
            } else {
                ctx.arc(hx + gridSize / 2, hy + gridSize / 2 + 6, 4, 0, Math.PI, false);
            }
            ctx.stroke();
        }

        function placeFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            // Не размещать еду на змейке
            for (let part of snake) {
                if (food.x === part.x && food.y === part.y) {
                    placeFood();
                    break;
                }
            }
        }

        function gameOver() {
            gameRunning = false;
            gameOverEl.style.display = 'block';
        }

        function resetGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            food = { x: 15, y: 15 };
            dx = 1;
            dy = 0;
            score = 0;
            scoreEl.textContent = 'Счёт: 0';
            gameOverEl.style.display = 'none';
            gameRunning = true;
        }

        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            switch (e.key) {
                case 'ArrowUp':
                    if (dy === 0) { dx = 0; dy = -1; }
                    break;
                case 'ArrowDown':
                    if (dy === 0) { dx = 0; dy = 1; }
                    break;
                case 'ArrowLeft':
                    if (dx === 0) { dx = -1; dy = 0; }
                    break;
                case 'ArrowRight':
                    if (dx === 0) { dx = 1; dy = 0; }
                    break;
            }
        });

        setInterval(drawGame, 100);
    </script>
</body>
</html>
